services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "EntpFlow@123"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "EntpFlow@123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend/EntpFlow
      dockerfile: Dockerfile
    ports:
      - "7033:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=EntpFlowDB;User Id=sa;Password=EntpFlow@123;TrustServerCertificate=True;Encrypt=False
      - Jwt__Key=$$2a$$11$$XVvl4oCnKAL3OzUpRL22TuQIvy9w1Zq68MgCqEDrkexPs5U/6EPWu
      - Jwt__Issuer=EntpFlowApi
      - Jwt__Audience=EntpFlowClient
      - Jwt__ExpiryMinutes=60
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend/entpflow-ui
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend

volumes:
  sqldata: