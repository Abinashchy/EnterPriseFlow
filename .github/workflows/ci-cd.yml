name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_NAME: entpflowacr096
  ACR_LOGIN_SERVER: entpflowacr096.azurecr.io
  RESOURCE_GROUP: entoflow-rg
  BACKEND_IMAGE: entpflow-backend
  FRONTEND_IMAGE: entpflow-frontend

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build backend
        run: dotnet build backend/EntpFlow/EntpFlow.csproj -c Release

      - name: Run tests
        run: dotnet test backend/EntpFlow.Tests/EntpFlow.Tests.csproj -c Release --verbosity normal

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/entpflow-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: Frontend/entpflow-ui
        run: npm ci

      - name: Build frontend
        working-directory: Frontend/entpflow-ui
        run: npm run build

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push backend image
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:latest \
            ./backend/EntpFlow
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        run: |
          docker build \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:latest \
            ./Frontend/entpflow-ui
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:latest

      - name: Deploy backend to Container Apps
        run: |
          az containerapp update \
            --name entpflow-backend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Get backend FQDN
        id: backend
        run: |
          FQDN=$(az containerapp show \
            --name entpflow-backend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT

      - name: Deploy frontend to Container Apps
        run: |
          az containerapp update \
            --name entpflow-frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --set-env-vars "BACKEND_URL=https://${{ steps.backend.outputs.fqdn }}"

      - name: Print deployment URLs
        run: |
          FRONTEND_FQDN=$(az containerapp show \
            --name entpflow-frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "### Deployment Complete! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** https://$FRONTEND_FQDN" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend:** https://${{ steps.backend.outputs.fqdn }}" >> $GITHUB_STEP_SUMMARY
